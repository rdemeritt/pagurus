# docker-compose.hermithost.yml
# Traefik reverse proxy overlay for Pagurus.
# Works with any Traefik v2/v3 setup: HermitHost, Coolify, Caprover, or standalone.
# Usage: docker compose -f docker-compose.yml -f docker-compose.hermithost.yml up -d
# Requires: traefik Docker network (created by Traefik or your platform)
# Required env vars: PAGURUS_DOMAIN (e.g., pagurus.example.com)

services:
  pagurus:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pagurus.rule=Host(`${PAGURUS_DOMAIN:?PAGURUS_DOMAIN required}`)"
      - "traefik.http.routers.pagurus.entrypoints=websecure"
      - "traefik.http.routers.pagurus.tls=true"
      - "traefik.http.routers.pagurus.tls.certresolver=letsencrypt"
      - "traefik.http.services.pagurus.loadbalancer.server.port=8080"
      - "traefik.docker.network=traefik"
    networks:
      - traefik
      - default
    # Override port binding — Traefik handles external traffic
    ports: []

networks:
  traefik:
    external: true
