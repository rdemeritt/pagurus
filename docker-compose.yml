services:
  pagurus:
    build: .
    restart: unless-stopped
    ports:
      - "${PAGURUS_BIND_HOST:-127.0.0.1}:${PAGURUS_BIND_PORT:-8080}:8080"
    volumes:
      - pagurus-data:/data
      - ${HOST_WORKSPACE:-./workspace}:/workspace
    env_file: .env
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pagurus-data:
